<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* Floating background circles */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      animation: float 6s ease-in-out infinite;
    }
    body::before {
      width: 400px; height: 400px;
      background: rgba(100, 80, 255, 0.15);
      top: -100px; left: -100px;
    }
    body::after {
      width: 300px; height: 300px;
      background: rgba(255, 80, 180, 0.1);
      bottom: -80px; right: -80px;
      animation-delay: 3s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(30px) scale(1.05); }
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 48px 40px;
      width: 380px;
      animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #6c63ff, #e040fb);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px; color: #fff;
      box-shadow: 0 8px 24px rgba(108, 99, 255, 0.5);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 24px rgba(108, 99, 255, 0.5); }
      50%       { box-shadow: 0 8px 40px rgba(108, 99, 255, 0.9); }
    }

    h2 {
      text-align: center;
      color: #fff;
      font-size: 1.6rem;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.45);
      font-size: 0.85rem;
      margin-bottom: 32px;
    }

    .field {
      position: relative;
      margin-bottom: 20px;
    }

    .field i {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.35);
      font-size: 15px;
      transition: color 0.3s;
    }

    .field input {
      width: 100%;
      padding: 13px 14px 13px 42px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.3s, background 0.3s;
    }

    .field input::placeholder { color: rgba(255,255,255,0.3); }

    .field input:focus {
      border-color: #6c63ff;
      background: rgba(108, 99, 255, 0.1);
    }

    .field input:focus + i,
    .field i:has(+ input:focus) { color: #6c63ff; }

    /* icon color on focus — sibling trick */
    .field:focus-within i { color: #a78bfa; }

    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 0.82rem;
    }

    .options label { color: rgba(255,255,255,0.5); cursor: pointer; display: flex; gap: 6px; align-items: center; }
    .options a { color: #a78bfa; text-decoration: none; }
    .options a:hover { text-decoration: underline; }

    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #6c63ff, #e040fb);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 20px rgba(108, 99, 255, 0.4);
    }

    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(108, 99, 255, 0.6); }
    .btn:active { transform: translateY(0); }

    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 24px 0;
      color: rgba(255,255,255,0.25); font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: rgba(255,255,255,0.1);
    }

    .social {
      display: flex; gap: 12px; justify-content: center;
    }

    .social-btn {
      flex: 1;
      padding: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: rgba(255,255,255,0.7);
      font-size: 0.85rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background 0.3s, border-color 0.3s;
    }
    .social-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.25); }

    .signup {
      text-align: center;
      margin-top: 22px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
    }
    .signup a { color: #a78bfa; text-decoration: none; }
    .signup a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="card">
    <div class="avatar"><i class="fa-solid fa-user"></i></div>
    <h2>Welcome Back</h2>
    <p class="subtitle">Sign in to your account</p>

    <form>
      <div class="field">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" placeholder="Email address" required>
      </div>
      <div class="field">
        <i class="fa-solid fa-lock"></i>
        <input type="password" placeholder="Password" required>
      </div>

      <div class="options">
        <label><input type="checkbox"> Remember me</label>
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit" class="btn"><i class="fa-solid fa-right-to-bracket"></i> &nbsp;Sign In</button>
    </form>

    <div class="divider">or continue with</div>

    <div class="social">
      <button class="social-btn"><i class="fa-brands fa-google"></i> Google</button>
      <button class="social-btn"><i class="fa-brands fa-github"></i> GitHub</button>
    </div>

    <p class="signup">Don't have an account? <a href="#">Sign up</a></p>
  </div>

</body>
</html>
