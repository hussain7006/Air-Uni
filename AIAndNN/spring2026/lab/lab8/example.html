<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detailed Perceptron Story | Lab 08</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #020617;
            color: white;
            overflow: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .character {
            font-size: 100px;
            position: absolute;
        }

        .data-card {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            padding: 10px;
            border-radius: 12px;
        }

        .math-symbol {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: #818cf8;
        }

        .typing-text::after {
            content: '|';
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
    </style>
</head>

<body class="h-screen flex flex-col items-center justify-between p-8">

    <div class="glass w-full max-w-4xl p-8 rounded-[32px] text-center shadow-2xl relative z-20">
        <div id="step-tag" class="text-indigo-400 text-xs font-black uppercase tracking-[0.2em] mb-2">System Initialized
        </div>
        <h2 id="narration" class="text-xl md:text-2xl font-bold text-slate-100 leading-relaxed min-h-[100px]">
            Taiyar hain? Chalein Perceptron ki kahani ko bariki se samajhte hain...
        </h2>
    </div>

    <div
        class="relative w-full max-w-6xl h-[550px] glass rounded-[40px] overflow-hidden border-white/5 bg-slate-900/20">

        <div class="absolute left-6 top-6 space-y-4 z-10">
            <div class="data-card w-48">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Input (x)</p>
                <div class="flex justify-between text-sm"><span>Khana:</span> <span id="val-x1"
                        class="text-green-400">0</span></div>
                <div class="flex justify-between text-sm"><span>Homework:</span> <span id="val-x2"
                        class="text-blue-400">0</span></div>
            </div>
            <div class="data-card w-48 border-indigo-500/40">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Weights (w)</p>
                <div class="flex justify-between text-sm"><span>w1 (Khana):</span> <span
                        class="text-indigo-400">0.8</span></div>
                <div class="flex justify-between text-sm"><span>w2 (HW):</span> <span class="text-indigo-400">0.2</span>
                </div>
            </div>
        </div>

        <div id="mummy" class="character right-20 top-1/2 -translate-y-1/2">👩‍🏫</div>
        <div id="boy" class="character -left-40 top-1/2 -translate-y-1/2">👦</div>

        <div id="logic-box"
            class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 opacity-0 scale-50 text-center">
            <div class="text-6xl mb-4" id="logic-icon">❓</div>
            <div class="bg-black/60 p-6 rounded-3xl border-2 border-white/10 backdrop-blur-md">
                <p class="text-xs text-gray-400 uppercase font-bold mb-2 italic">Summation Score</p>
                <div class="text-4xl font-black text-white" id="score-text">0.0</div>
                <div class="mt-4 px-6 py-2 rounded-full bg-white/5 text-sm font-mono" id="formula-text">Result = ???
                </div>
            </div>
        </div>

        <div id="chocolate" class="character left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 opacity-0">🍫</div>
    </div>

    <div class="flex gap-4 mb-4">
        <button id="btn-next" onclick="nextAction()"
            class="bg-indigo-600 hover:bg-indigo-500 px-14 py-5 rounded-2xl font-black text-xl shadow-2xl shadow-indigo-500/40 transition-all flex items-center gap-4 active:scale-95">
            Next Step <i data-lucide="chevron-right"></i>
        </button>
        <button onclick="location.reload()"
            class="bg-slate-800 hover:bg-slate-700 px-8 py-5 rounded-2xl font-bold">Reset</button>
    </div>

    <script>
        lucide.createIcons();
        let stepCount = 0;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(f, t, d) {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = t; o.frequency.value = f;
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function updateText(text) {
            const el = document.getElementById("narration");
            let i = 0;
            el.innerHTML = "";
            const timer = setInterval(() => {
                if (i < text.length) {
                    el.innerHTML += text.charAt(i);
                    i++;
                } else {
                    clearInterval(timer);
                    el.innerHTML += '<span class="typing-text"></span>';
                }
            }, 25);
        }

        function nextAction() {
            stepCount++;
            const tag = document.getElementById('step-tag');

            if (stepCount === 1) {
                tag.innerText = "Step 1: Input Data (x)";
                updateText("Bacha Mummy ke paas aata hai. Iska matlab hai AI system mein 'Features' ya 'Input Data' (x) enter ho raha hai. Filhaal dono inputs '0' hain.");
                gsap.to("#boy", { left: "15%", duration: 1.5, ease: "back.out" });
                playSound(440, 'sine', 0.2);
            }
            else if (stepCount === 2) {
                tag.innerText = "Step 2: Assigning Weights (w)";
                updateText("Mummy har input ki ahmiyat check karti hain. 'Khana' zyada aham hai (Weight = 0.8) aur 'Homework' thora kam (Weight = 0.2).");
                document.getElementById('val-x1').innerText = "1 (Yes)";
                document.getElementById('val-x2').innerText = "1 (Yes)";
                gsap.to(".data-card", { scale: 1.1, repeat: 1, yoyo: true });
                playSound(550, 'sine', 0.2);
            }
            else if (stepCount === 3) {
                tag.innerText = "Step 3: Summation (Σ)";
                updateText("Mummy ka dimaag calculation karta hai: (Input × Weight). Score banta hai: (1 × 0.8) + (1 × 0.2) = 1.0. Isay hum Dot Product kehte hain.");
                gsap.to("#logic-box", { opacity: 1, scale: 1, duration: 0.8 });
                gsap.to("#score-text", { innerText: 1.0, snap: { innerText: 0.1 }, duration: 1 });
                document.getElementById('formula-text').innerText = "Score: 1.0";
                playSound(660, 'triangle', 0.4);
            }
            else if (stepCount === 4) {
                tag.innerText = "Step 4: Activation Function";
                updateText("AI ek limit (Threshold) check karta hai. Agar score '0.5' se upar hai, to result 'HAAN' (1) hoga. Hamara score 1.0 hai, jo ke limit se zyada hai!");
                document.getElementById('logic-icon').innerText = "✅";
                document.getElementById('logic-box').classList.add('border-green-500/50');
                playSound(880, 'sine', 0.1); playSound(1100, 'sine', 0.2);
            }
            else if (stepCount === 5) {
                tag.innerText = "Step 5: Output (y)";
                updateText("RESULT: Chocolate mil gayi! AI ne successfully classify kiya ke bacha reward ke kabil hai. Faisla '1' hai.");
                gsap.to("#logic-box", { opacity: 0, scale: 0.5, duration: 0.5 });
                gsap.to("#chocolate", { opacity: 1, scale: 1.5, y: -100, duration: 1, ease: "elastic.out" });
                document.getElementById('mummy').innerText = "👩‍👦";
                document.getElementById('boy').innerText = "🤩";
                playSound(1200, 'square', 0.5);
            }
        }
    </script>
</body>

</html>
