      const pseudoCurve = {
        4: [18, 12, 8, 6, 4, 3, 2, 2, 1, 1],
        3: [24, 18, 14, 11, 9, 8, 6, 5, 5, 4],
        2: [32, 28, 25, 22, 20, 18, 17, 16, 15, 15],

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function trainOrPerceptron() {
        const samples = [
          { x: [0, 0], y: 0 },
          { x: [0, 1], y: 1 },
          { x: [1, 0], y: 1 },
          { x: [1, 1], y: 1 },
        ];
        let weights = [0, 0, 0];
        const history = [];

        for (let epoch = 0; epoch < 8; epoch += 1) {
          let errors = 0;
          for (const sample of samples) {
            const input = [1, ...sample.x];
            const score = weights.reduce((sum, weight, index) => sum + weight * input[index], 0);
            const prediction = score > 0 ? 1 : 0;
            const delta = sample.y - prediction;
            if (delta !== 0) {
              weights = weights.map((weight, index) => weight + delta * input[index]);
              errors += 1;
            }
          }
          history.push(errors);
          if (errors === 0) break;
        }

        const predictions = samples.map((sample) => {
          const input = [1, ...sample.x];
          const score = weights.reduce((sum, weight, index) => sum + weight * input[index], 0);
          return { sample: sample.x, actual: sample.y, predicted: score > 0 ? 1 : 0 };
        });

        return { weights, history, predictions };
      }
