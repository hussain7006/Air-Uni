<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>PCA Mechanical Explainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .point {
            transition: all 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .axis {
            transition: all 1s ease;
        }

        .error-line {
            stroke-dasharray: 4;
            animation: dash 1s linear infinite;
        }

        @keyframes dash {
            to {
                stroke-dashoffset: 10;
            }
        }
    </style>
</head>

<body class="bg-slate-50 p-8 font-sans">

    <div class="max-w-6xl mx-auto">
        <header class="mb-10 border-b pb-6">
            <h1 class="text-4xl font-black text-slate-800">PCA: Under the Hood ⚙️</h1>
            <p class="text-slate-500 mt-2 text-lg">Bacchon ko dikhayein ke PCA math mein "Physical Rotation" kaise karta
                hai.</p>
        </header>

        <div class="grid lg:grid-cols-3 gap-10">

            <div class="space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-200">
                    <h3 class="font-bold text-slate-700 mb-4 uppercase text-xs tracking-widest">Step-by-Step Logic</h3>

                    <button onclick="showOriginal()"
                        class="w-full mb-3 bg-slate-800 text-white p-4 rounded-2xl font-bold hover:bg-slate-700 transition">
                        1. Show Raw Data (4D Input)
                    </button>

                    <button onclick="rotateAxis()"
                        class="w-full mb-3 bg-blue-600 text-white p-4 rounded-2xl font-bold hover:bg-blue-500 transition">
                        2. Find Eigenvector (Best Angle)
                    </button>

                    <button onclick="projectPoints()"
                        class="w-full mb-3 bg-emerald-600 text-white p-4 rounded-2xl font-bold hover:bg-emerald-500 transition">
                        3. Project to 2D (Squeeze)
                    </button>

                    <button onclick="showErrors()"
                        class="w-full bg-red-500 text-white p-4 rounded-2xl font-bold hover:bg-red-400 transition">
                        4. Show Info Loss (Error)
                    </button>
                </div>

                <div class="bg-blue-50 p-6 rounded-3xl border border-blue-100">
                    <h4 class="font-bold text-blue-800 text-sm">Sir, Explanation Kya Hai?</h4>
                    <p id="explainer-text" class="text-sm text-blue-600 mt-2 leading-relaxed">
                        Bachon ko batayein ke PCA data ko tab tak **Rotate** karta hai jab tak points ek line mein sab
                        se zyada "Phail" (Variance) na jayen.
                    </p>
                </div>
            </div>

            <div
                class="lg:col-span-2 bg-white rounded-[3rem] shadow-2xl border-4 border-slate-100 relative overflow-hidden flex items-center justify-center min-h-[500px]">
                <svg id="viz-svg" width="500" height="400" viewBox="0 0 500 400" class="overflow-visible">
                    <line id="axis-x" x1="50" y1="200" x2="450" y2="200" stroke="#cbd5e1" stroke-width="2" />
                    <line id="axis-y" x1="250" y1="50" x2="250" y2="350" stroke="#cbd5e1" stroke-width="2" />

                    <line id="pc-line" x1="250" y1="200" x2="250" y2="200" stroke="#2563eb" stroke-width="4"
                        stroke-linecap="round" class="opacity-0 transition-all duration-1000" />

                    <g id="points-group"></g>
                    <g id="error-lines-group"></g>
                </svg>
            </div>
        </div>
    </div>

    <script>
        const points = [
            { x: 150, y: 150 }, { x: 180, y: 170 }, { x: 220, y: 190 },
            { x: 280, y: 230 }, { x: 320, y: 250 }, { x: 350, y: 280 },
            { x: 200, y: 220 }, { x: 300, y: 180 }
        ];

        function init() {
            const group = document.getElementById('points-group');
            points.forEach((p, i) => {
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", p.x);
                circle.setAttribute("cy", p.y);
                circle.setAttribute("r", 6);
                circle.setAttribute("fill", "#64748b");
                circle.setAttribute("class", "point");
                circle.setAttribute("id", `point-${i}`);
                group.appendChild(circle);
            });
        }

        function showOriginal() {
            document.getElementById('explainer-text').innerText = "Ye 4D data ka ek slice hai. Points bikhre hue hain, inka koi clear rukh nahi hai.";
            resetViz();
        }

        function rotateAxis() {
            const pcLine = document.getElementById('pc-line');
            pcLine.setAttribute("x1", 50);
            pcLine.setAttribute("y1", 100);
            pcLine.setAttribute("x2", 450);
            pcLine.setAttribute("y2", 300);
            pcLine.style.opacity = "1";
            document.getElementById('explainer-text').innerText = "PCA ne 'Eigenvector' dhoond liya! Ye wo neeli line hai jo data ke phailao (Variance) ke bilkul beech se guzar rahi hai.";
        }

        function projectPoints() {
            points.forEach((p, i) => {
                const circle = document.getElementById(`point-${i}`);
                // Simple projection math for demo: move points onto the PC line
                const offset = (p.x - 250) * 1.1;
                circle.setAttribute("cx", 250 + offset);
                circle.setAttribute("cy", 200 + (offset * 0.5));
                circle.setAttribute("fill", "#10b981");
            });
            document.getElementById('explainer-text').innerText = "BOOM! PCA ne saare points line par gira diye. Ab har point ko define karne ke liye 2 numbers nahi, sirf line par uski position kafi hai.";
        }

        function showErrors() {
            const errorGroup = document.getElementById('error-lines-group');
            errorGroup.innerHTML = '';
            points.forEach((p, i) => {
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                const offset = (p.x - 250) * 1.1;
                line.setAttribute("x1", p.x);
                line.setAttribute("y1", p.y);
                line.setAttribute("x2", 250 + offset);
                line.setAttribute("y2", 200 + (offset * 0.5));
                line.setAttribute("stroke", "#ef4444");
                line.setAttribute("class", "error-line");
                errorGroup.appendChild(line);
            });
            document.getElementById('explainer-text').innerText = "LAL LAKREIN (Red Lines) dekhein! Ye wo 'Information' hai jo PCA ne zaya kar di. Agar ye lakrein choti hain, to hamara PCA kamyab hai (High Accuracy).";
        }

        function resetViz() {
            document.getElementById('pc-line').style.opacity = "0";
            document.getElementById('error-lines-group').innerHTML = '';
            points.forEach((p, i) => {
                const circle = document.getElementById(`point-${i}`);
                circle.setAttribute("cx", p.x);
                circle.setAttribute("cy", p.y);
                circle.setAttribute("fill", "#64748b");
            });
        }

        init();
    </script>
</body>

</html>
